<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=addclosebackspaceremove" />
</head>
<body>
    <main>
        <section id="num"></section>
        <section id="teclado">
            <div id="delete" class="cordestaque" onclick="del()">C</div>
            <div id="backspace" class="cordiferente" onclick="backspace()">
                <span class="material-symbols-outlined">backspace</span>
            </div>
            <div id="divisao" class="cordiferente">&divide</div>
            <div id="multi" class="cordiferente">
                <span class="material-symbols-outlined">close</span>
            </div>
            <div id="sete" onclick="sete()">7</div>
            <div id="oito" onclick="oito()">8</div>
            <div id="nove" onclick="nove()">9</div>
            <div id="menos" class="cordiferente" onclick="menos()">
                <span class="material-symbols-outlined">remove</span>
            </div>
            <div id="quatro" onclick="quatro()">4</div>
            <div id="cinco" onclick="cinco()">5</div>
            <div id="seis" onclick="seis()">6</div>
            <div id="mais" class="cordiferente" onclick="mais()">
                <span class="material-symbols-outlined">add</span>
            </div>
            <div id="um" onclick="um()">1</div>
            <div id="dois" onclick="dois()">2</div>
            <div id="tres" onclick="tres()">3</div>
            <div id="igual" class="cordestaque" onclick="igual()">=</div>
            <div id="zero" onclick="zero()">0</div>
            <div id="ponto">.</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
